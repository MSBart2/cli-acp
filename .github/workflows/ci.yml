name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install webapp dependencies
        run: |
          npm ci --prefix webapp
          npm ci --prefix webapp/server
          npm ci --prefix webapp/client

      - name: Run tests
        run: npm run test

      - name: Build client bundle
        run: npm run build
